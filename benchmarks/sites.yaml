#   - fill-multi-step-form: httpbin-forms, the-internet (2) ✓
#   - upload-download-file: httpbin-forms, the-internet (2) ✓
#   - extract-table-pagination: wikipedia-list, openalex, arxiv, weather-gov, hacker-news (5) ✓
#   - handle-infinite-scroll: wikipedia-infinite, guardian (2) ✓
#   - search-and-filter: openalex, weather-gov, cdc, ebay, rei, github, pypi (7) ✓
#   - pagination-next-page: arxiv, ebay, rei, github, pypi, stackoverflow, hacker-news (7) ✓
#   - date-picker-widget: booking, opentable (2) ✓
#   - searchable-dropdown: opentable (1) — TODO add a 2nd site
#   - login-flow: the-internet (1) — sufficient for v1 (single sandbox is correct posture)
#   - detect-captcha: cloudflare (1) — sufficient; never need many
#   - exit-tracking-popup: bbc (1) — TODO add a 2nd site

# Notes on what's deliberately NOT here:
#   - amazon.com — too anti-bot, demo will be flaky and ToS pushes back
#   - linkedin.com — strict scraping ToS
#   - facebook/instagram — login walls + ToS
#   - any site with explicit anti-scraping language
