<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>dismiss-cookie-banner fixture</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; }
    #onetrust-banner-sdk {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1c1c1c; color: #fff; padding: 1rem; z-index: 9999;
      display: flex; justify-content: space-between; align-items: center;
    }
    #onetrust-accept-btn-handler {
      background: #4caf50; color: white; padding: 0.5rem 1rem;
      border: 0; border-radius: 4px; cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>Fixture page</h1>
    <p>OneTrust-style cookie consent banner. Click "Accept All Cookies" — or let the skill do it.</p>
  </main>
  <div id="onetrust-banner-sdk" role="dialog" aria-label="cookie consent">
    <span>We use cookies for analytics.</span>
    <button id="onetrust-accept-btn-handler">Accept All Cookies</button>
  </div>
  <script>
    document.getElementById('onetrust-accept-btn-handler').addEventListener('click', () => {
      document.getElementById('onetrust-banner-sdk').style.display = 'none';
    });
  </script>
</body>
</html>
